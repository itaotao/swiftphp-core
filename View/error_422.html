<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据验证失败 · 422</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .title {
            font-size: 8rem;
            font-weight: 900;
            color: #3498db;
            line-height: 1;
            margin-bottom: 1rem;
            animation: slide 1.5s ease-in-out infinite;
        }

        @keyframes slide {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }

        .subtitle {
            font-size: 1.5rem;
            color: #2980b9;
            margin-bottom: 1rem;
        }

        .desc {
            color: #7f8c8d;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #3498db;
            border: 1px solid #3498db;
        }

        .btn-secondary:hover {
            background: rgba(52, 152, 219, 0.1);
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
        }

        .footer a {
            color: #3498db;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">422</div>
        <div class="subtitle">数据验证失败</div>
        <div class="desc">
            抱歉，您提交的数据不符合要求。<br>
            请检查表单填写是否完整，格式是否正确。
        </div>
        <div class="btn-group">
            <a href="javascript:history.back()" class="btn btn-secondary">返回上一页</a>
            <a href="/" class="btn btn-primary">返回首页</a>
        </div>
    </div>
    <div class="footer">
        Powered by <a href="https://swiftphp.com">SwiftPHP</a> Framework
    </div>
</body>
</html>
