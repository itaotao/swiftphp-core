<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请求参数有误 · 400</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #a8e6cf 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .title {
            font-size: 8rem;
            font-weight: 900;
            color: #f39c12;
            line-height: 1;
            margin-bottom: 1rem;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .subtitle {
            font-size: 1.5rem;
            color: #d68910;
            margin-bottom: 1rem;
        }

        .desc {
            color: #7f8c8d;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #f39c12;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #d68910;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(243, 156, 18, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #f39c12;
            border: 1px solid #f39c12;
        }

        .btn-secondary:hover {
            background: rgba(243, 156, 18, 0.1);
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
        }

        .footer a {
            color: #f39c12;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">400</div>
        <div class="subtitle">请求参数有误</div>
        <div class="desc">
            抱歉，您的请求格式不正确，服务器无法理解。<br>
            请检查您发送的数据后重试。
        </div>
        <div class="btn-group">
            <a href="javascript:history.back()" class="btn btn-secondary">返回上一页</a>
            <a href="/" class="btn btn-primary">返回首页</a>
        </div>
    </div>
    <div class="footer">
        Powered by <a href="https://swiftphp.com">SwiftPHP</a> Framework
    </div>
</body>
</html>
